{% extends 'base.html' %}
{% block content %}
<div class="panel">
  <h1>Budgets</h1>
  <form method="post" class="inline-form">
    <label for="category">Category</label>
    <input type="text" id="category" name="category" placeholder="food, travel" required />
    <label for="limit_amount">Limit Amount</label>
    <input type="number" step="0.01" id="limit_amount" name="limit_amount" required />
    <button type="submit">Save Budget</button>
  </form>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>Limit</th>
        </tr>
      </thead>
      <tbody>
        {% for item in budgets %}
        <tr>
          <td>{{ item['category'].title() }}</td>
          <td>₹{{ item['limit_amount'] | round(2) }}</td>
        </tr>
        {% else %}
        <tr><td colspan="2">No budgets set yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
